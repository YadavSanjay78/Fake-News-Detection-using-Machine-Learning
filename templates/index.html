<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

.container {
    width: min(700px, calc(100% - 32px));
    margin: auto;
    margin-top: 80px;
    text-align: center;
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

textarea {
    width: 100%;
    height: 150px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    box-sizing: border-box;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    min-height: 44px;
    border: none;
    border-radius: 5px;
    background: #ff7eb3;
    color: white;
    cursor: pointer;
    font-size: 1rem;
}

.result {
    margin-top: 20px;
}

.dashboard-link {
    margin-top: 15px;
    display: inline-block;
    color: #ffffff;
    text-decoration: none;
    font-weight: bold;
    min-height: 44px;
    line-height: 44px;
    padding: 0 10px;
}

@media (max-width: 768px) {
    .container {
        margin-top: 24px;
        padding: 18px;
        border-radius: 12px;
    }

    h1 {
        font-size: 1.5rem;
        margin-top: 0;
    }

    textarea {
        height: 130px;
    }

    button {
        width: 100%;
        padding: 12px 16px;
    }

    .dashboard-link {
        width: 100%;
        box-sizing: border-box;
    }
}

@media (max-width: 420px) {
    .container {
        width: calc(100% - 20px);
        padding: 14px;
    }

    h1 {
        font-size: 1.3rem;
    }
}
    </style>
</head>
<body>

<div class="container">
    <h1>📰 Fake News Detection</h1>

    <form action="/predict" method="post">
        <textarea name="news" placeholder="Enter news text..." required></textarea>
        <button type="submit">Analyze</button>
    </form>

    <a class="dashboard-link" href="/dashboard">📊 Open Graph Dashboard</a>

    {% if result %}
    <div class="result">
        {% if result == 'real' %}
            <h2 style="color:lightgreen;">✅ REAL NEWS</h2>
        {% else %}
            <h2 style="color:red;">❌ FAKE NEWS</h2>
        {% endif %}
        <p>Confidence: {{ confidence }}%</p>
    </div>
    {% endif %}
</div>

</body>
</html>
